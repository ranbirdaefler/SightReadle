<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SightReadle - Daily Sight Reading Challenge</title>
    <link rel="icon" type="image/png" href="/images/logo.png">
    <link rel="stylesheet" href="/css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/opensheetmusicdisplay@1.8.6/build/opensheetmusicdisplay.min.js"></script>
</head>
<body>
    <div class="container">
        <header class="header">
            <div style="display: flex; align-items: center; justify-content: center; gap: 12px;">
                <img src="/images/logo.png" alt="SightReadle" style="height: 40px; width: auto;">
                <h1>SightReadle</h1>
            </div>
            <p>Daily sight-reading challenge for pianists</p>
        </header>

        <div class="mode-selector">
            <button class="mode-btn active" id="daily-btn">Daily Challenge</button>
            <button class="mode-btn" id="random-btn">Random Practice</button>
        </div>

        <main class="challenge-card" id="challenge-card">
            <div id="challenge-header" class="challenge-info">
                <h2 class="challenge-title" id="challenge-title">Daily Challenge</h2>
                <p class="challenge-meta" id="challenge-meta"></p>
            </div>

            <div class="music-container">
                <div id="sheet-music-container" class="osmd-container">
                    <div class="loading">Loading sheet music...</div>
                </div>
            </div>

            <div class="tempo-control">
                <label for="tempo-slider">Tempo:</label>
                <input type="range" id="tempo-slider" class="tempo-slider" min="30" max="200" value="120" step="5">
                <span id="tempo-display" class="tempo-display">&#9833; = 120</span>
                <button class="btn btn-small btn-secondary" id="tempo-reset-btn">Reset</button>
                <button class="btn btn-small btn-metronome" id="metronome-btn">Metronome</button>
            </div>

            <div class="controls">
                <button class="btn btn-secondary" id="listen-btn">Listen to Reference</button>
                <button class="btn btn-record" id="record-btn">Start Recording</button>
                <button class="btn btn-secondary" id="refresh-btn" style="display:none">New Challenge</button>
            </div>

            <div id="recording-status" class="recording-status hidden">
                <div class="recording-indicator">
                    <span class="recording-dot"></span>
                    Recording... <span id="recording-timer">0:00</span>
                </div>
                <button class="btn btn-primary" id="stop-btn">Stop &amp; Score</button>
            </div>

            <div id="countdown-container" class="hidden">
                <div class="countdown-display" id="countdown-number">3</div>
            </div>

            <div id="results-section" class="score-results hidden">
                <div class="overall-score">
                    <span class="score-number" id="overall-score-value">--</span>
                    <span class="score-label">Overall Score</span>
                </div>

                <div class="score-breakdown">
                    <div class="score-item">
                        <span class="score-category">Pitch</span>
                        <div class="score-bar"><div class="score-fill" id="pitch-bar"></div></div>
                        <span class="score-value" id="pitch-value">--</span>
                    </div>
                    <div class="score-item">
                        <span class="score-category">Rhythm</span>
                        <div class="score-bar"><div class="score-fill" id="rhythm-bar"></div></div>
                        <span class="score-value" id="rhythm-value">--</span>
                    </div>
                    <div class="score-item">
                        <span class="score-category">Completeness</span>
                        <div class="score-bar"><div class="score-fill" id="completeness-bar"></div></div>
                        <span class="score-value" id="completeness-value">--</span>
                    </div>
                </div>

                <div id="recording-playback" class="playback-section hidden">
                    <h4>Your Recording</h4>
                    <audio id="playback-audio" controls></audio>
                </div>

                <div class="controls" style="margin-top:20px">
                    <button class="btn btn-primary" id="try-again-btn">Try Again</button>
                </div>
            </div>

            <div id="leaderboard-section" class="leaderboard-section hidden">
                <h3>Today's Score Distribution</h3>
                <p id="leaderboard-message" class="leaderboard-message"></p>
                <p id="leaderboard-stats" class="leaderboard-stats"></p>
                <canvas id="distribution-chart" width="300" height="120"></canvas>
            </div>
        </main>

        <div id="loading-overlay" class="loading-overlay hidden">
            <div class="loading-spinner">
                <div class="spinner-ring"></div>
                <p id="loading-message">Analyzing your performance...</p>
            </div>
        </div>
    </div>

    <audio id="reference-audio" preload="none"></audio>

    <script src="/js/AudioRecorder.js"></script>
    <script src="/js/SightReadle.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
